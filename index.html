<div class="header">

</div>

        </div>
        <div class="setlist-items" id="setlistItems"></div>
      </div>

</div>

eeze caressing my cheek\ndoes mischief deep in my heart \nI had forgotten the solace you gave\nNow, drop by drop, I am reminded\nInside my pochette, you remain\njust as you once were", "jp_text": "ポシェットのおうた\n\n頬を撫でる　哀愁の風が\n胸の奥に　悪戯をして\n忘れていた　貴方の安らぎを\nじわじわと　思い出させる\nポシェットの中には　いつかの貴方が\nいつかのまま　残されていたのです", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 3}, {"title": "Heavy eyelashes", "album": "1st — Razorblade Maiden (剃刀乙女)", "en_file": "04 Heavy eyelashes.pdf", "jp_file": "04重たい睫毛.pdf", "en_text": "Heavy lashes\n\nHow far back must we go \nto find ourselves as we were then?\nWe lied to protect each other\nand to forgive each other \nPerhaps we were lost running,\nfleeing from the simple sincerity of life \nHumankind makes its way forward\nthrusting knives into one other —\nSuch is our fate\nOpen your eyes and see— \nlift those heavy, dripping eyelashes\nslowly, slowly\nHow far back must we go \nto find ourselves as we were then?", "jp_text": "「重たい睫毛」\n\nあといくつ戻れば　あの頃のぼくらに出会えるのかな\nぼくらは嘘で庇い合い　許し合い\n素直ないのちから　逃げ惑っていたのかもしれない\n人は誰かをナイフで突き刺しながら歩んでゆく\nそれがいのちのさだめ\n目を開けてみなさい\n水浸しな重たい睫毛を\n少しずつ開いて\nあといくつ戻れば　あの頃のぼくらに出会えるのかな", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 4}, {"title": "Guideposts", "album": "1st — Razorblade Maiden (剃刀乙女)", "en_file": "05 Guideposts.pdf", "jp_file": "05路標.pdf", "en_text": "michishirube \n\nGuideposts\nSavour the bliss \nand blink one more time\nUnwrap the memories \nburnt into your eyelids\nGently lay them out \nonto the palms of your hands\nI shall be the morning sun \nand shower you with light \nI shall beseech the sunrise \nwith prayers for your days to come \nGather up your scattered sorrows \nand blink one more time\nMould them into a round \nand let it harden, \nso light overflows\nLet it roll softly \nto illuminate your path\nI shall blanket you \nin a small light\nI shall sing you a song of guideposts\nperched upon a crescent moon", "jp_text": "路標\n\nしあわせかみしめて　またひとつまばたきを\nまぶたの裏側に　やきついた想い出を\nそっと開けて手のひらに並べてみて\nあなたに降りそそぐわ　朝日になって\n日の出と共に願うわ　あなたの未来を\nかなしみひろいあつめて　またひとつまばたきを\nまるめて固めれば　溢れ出すひかりを\nそっと転がして足元を照らしてみて\nあなたを包み込むわ　小さなあかりで\n路標のうた　歌うわ　三日月の上", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 5}, {"title": "Lightlizard", "album": "1st — Razorblade Maiden (剃刀乙女)", "en_file": "06 Lightlizard.pdf", "jp_file": "06光蜥蜴.pdf", "en_text": "hikaritokage\n\nLightlizard\nIn this exquisite neon-lit town tonight,\nlet us partake of the chalice of love\nThe prey of the night has taken the bait,\nand the Lightlizard starts to burn \nYou’ve fallen through the chasm   \nbetween love and evil,\nHow will you free yourself now?\nDazzled by the dazzling dark \nI’ve gone and defiled a pure, pure angel\nthough I didn’t mean harm\nForgive me, forgive me\nAs the grey morning mist comes for us,\nall that is tainted has nowhere to hide \nAll is laid bare\nas I am, just as I am", "jp_text": "光蜥蜴\n\nネオンの綺麗な夜の街　愛の杯を交わそうよ\n今宵の獲物が引っ掛かったよ　光蜥蜴は熱くなる\n愛と悪の狭間に落っこちて\n抜け出せないでしょん\n眩しいくらい　眩しい暗い\nまっちろな天使を汚しちゃったのん\n悪気はないけど\nご免なさい　ご免なさい\nお迎えの灰色の朝靄\n汚いものたちは隠れ場所をなくして\nさらけ出されるの　ぼくも　ぼくも。。。", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 6}, {"title": "A distant longing", "album": "1st — Razorblade Maiden (剃刀乙女)", "en_file": "07 A distant longing.pdf", "jp_file": "", "en_text": "A Distant Longing\n\nMy dream\nMy love\nWhen you are by my side, \neven the wind changes its colours\nWater shimmers and frolics with the light\nLet time dissolve into those faraway skies\nYour dream\nYour love\nWhen you smile,\nshadows disappear from my damp eyes\nMy heart burning with ardent longing \nI shall soon depart on a journey of hope \nReflecting forests in the rolling clouds\nbirds soar freely toward boundless skies", "jp_text": "", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 7}, {"title": "Visceral circus", "album": "1st — Razorblade Maiden (剃刀乙女)", "en_file": "08 Visceral circus.pdf", "jp_file": "08腸髪のサーカス.pdf", "en_text": "watakushi no circus\n\nVisceral circus\nCenotaph\nO Cenotaph\nWhere are you going without me? \nWhere are you headed,\nleaving me here alone? \nThe dust-laced mug\nsits silent and still, \nas if to refuse \neven fresh coffee\nThe cigarette stubs \nspilling out of the empty can\nare quite withered now \nEncrusted to the bathtub,\nthey sit silent and still \nDidn’t I tell you I notice everything?\nI am terribly suspicious by nature\nYou were only human after all,\nyou and she alike\nMy cold, astringent soul \npeels off the back of my throat \nSinking to the pit of my stomach, \nit sits silent and still\nThese trembling limbs cannot bear \nthis solitude\nI crumble to the floor, a bed of needles\nMy frost-bound heart, crushed by cruelty\nslowly begins to crawl \nCenotaph\nO Cenotaph\nWhere are you going without me?\nWhere are you headed, \nleaving me here alone?\nThe rod responds to my touch \nwith a dull sound \nWhen grasped, it smells of rust\nMy faithful antenna and I\nwe’ll track you down, beloved\nYes, we’ll track you down. \nCrimson has begun to flow, \nexpurgating the self \nThis visceral circus is my gift to her — \nit sits silent and still", "jp_text": "腸髪のサーカス\n\n霊碑\n何処へゆくの　貴方は　私を措いて　どこまで\n埃臭いマグカップは　温かな珈琲も\n要らないと言うように　静かにそこを動かない\n空缶に刺さる煙草たちは　もう随分干からびて\nバスタブにはりついたまま　静かにそこを動かない\n鋭敏だと言ったでしょう　勘繰りが酷いのです\nやはり貴方もあの子も　人間らしいひとでしたか\n喉の奥にはりついた　冷たく苦い魂は\n腹の底に沈んで行き　静かにそこを動かない\n震える手脚　孤独に負けて　倒れた床は剣山のよう\n凍える心臓　悪事に克てず　静かにそこから動き出す\n触れたラックは鈍い音　握ったそれは錆びたにおい\nお得意のアンテナで　大好きな貴方を追跡、追跡。\n流れ出した紅により　己の魂浄化\nあの子へ贈る腸髪のサーカス　静かにそこを動かない", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 8}, {"title": "The girl and the cage", "album": "2nd — Origami (檻髪)", "en_file": "The girl and the cage.pdf", "jp_file": "01少女と檻.pdf", "en_text": "syojo to ori\n\nThe girl and the cage\nThe girl \nleapt from the cage\nto her freedom\nIf your wings \nhave been torn from you,\nall you need to do is \nrun", "jp_text": "『少女と檻』 \n\n少女は　檻を飛び越え \n自由になる \nはねを毟られたら \n走ればいいさ", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 1}, {"title": "This grey day", "album": "2nd — Origami (檻髪)", "en_file": "This grey day.pdf", "jp_file": "02灰色の日.pdf", "en_text": "haiiro no hi\n\nThis grey day \nIn one corner of the screen door,\na sigh is caught in a little spiderweb\nTangled and unable to move,\nright before it died\nit turned its gaze upon me \nThough raindrops shower upon you, \ndon’t let them get to you\nIf only I could reach you\nIn one corner of the room,\na large blob unites with consciousness\nand begins to crawl　\nHold on tight\nas the wind rises\nDo not rely on the dangling rope — \nAll you need to do is walk \nSuch things happened \nthis grey day", "jp_text": "『灰色の日』 \n\n網戸の隅の　小さな　蜘蛛の巣に \n溜息が　絡まって　動けなくなって \n息絶える間際に　こちらを見た \n降りそそぐ雫に　負けないで \nあなたに　届けばいいのに \n部屋の隅の　大きな　塊と \n現が相まって　動き出す \n舞い上がる風に　堪え続けて \n垂れ下がるロープに　頼らないで \nあなたが　歩けばいいのに \n灰色の日の　できごと", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 2}, {"title": "Patchwork", "album": "2nd — Origami (檻髪)", "en_file": "Patchwork.pdf", "jp_file": "03パッチワーク.pdf", "en_text": "Patchwork\n\nI am absorbed in reading the book that is you \nin the haze beyond the window\nOh to wash down this ardour caught in my throat\neven once will suffice\nI cannot do it without you \nI’ve nurtured this heart \ninto a patchwork \nand gently adorn you with it \nYou in the window \nGathering fragments of time\nI am absorbed in reading the book that is you\nOh to awaken this molten heart \neven once will do \nI cannot do it without you\nI’ve nurtured this heart \ninto a patchwork \nand tenderly clothe you in it \nfor tomorrow\nI’ve nurtured this heart \ninto a patchwork \nand gently adorn you with it\nYou in the window", "jp_text": "『パッチワーク』 \n\n窓の向こうに霞む　あなたを読み耽る \nたった一度でもいい　のどに詰まった恋を \n飲み込むためには　あなたの力が必要 \n育てた心をパッチワークに \n窓のあなたに　そっと飾るの \n時のかけらを集めて　あなたを読み耽る \nたった一度でもいい　熱く溶けたわたしを \n覚ますためには　あなたの力が必要 \n育てた心をパッチワークに \n明日のあなたに　そっと着せるの \n育てた心をパッチワークに \n窓のあなたに　そっと飾るの", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 3}, {"title": "Behind the lace", "album": "2nd — Origami (檻髪)", "en_file": "Behind the lace.pdf", "jp_file": "04レースのむこう.pdf", "en_text": "lace no mukou\n\nBehind the lace\nYour voice \nlingering behind the lace \nwill someday bloom flowers on the verdure \nWhen I have warmed the spun flutter of eyelids, \nBeribboned heels resounding \nI will run to embrace you \nSometimes even the longest rain yields no rainbow\nAnd wrapped in blankets, locks of solitude will also tangle \nOur fingertips entwined and quivering, \nBehind the lace \nA welcoming figure appears \nupon the meadow", "jp_text": "『レースのむこう』 \n\nレースのむこうに　佇む　あなたの声 \nいつしかみどりの　上で　花咲かせるよ \n紡いだまばたきを　温めたら \nリボンの靴鳴らして　あなたを愛でに行くわ \n時には霖雨も　虹を　架けたがらず \n毛布に包まる　孤独の　髪も絡まる \n繋いだ指先を　震わせたら \nレースのむこうには　野原に迎えるひとが", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 4}, {"title": "Toughen up", "album": "2nd — Origami (檻髪)", "en_file": "Toughen up.pdf", "jp_file": "05つよくなる.pdf", "en_text": "tsuyoku naru\n\nToughen up\nMy limbs entangled in this artwork \nlarge enough to cover me whole\nWhen the time comes to run,\nI don’t want to miss it\nSo with Manuka honey and propolis\nl toughen up\nDiving through polka dots, \nLet me run with you to eternity\nIf a terrible demon arrives \ncarrying colossal pain,\nLet us try to welcome it\nwith a handshake \nI’d like us to be friends now\nSo with almonds and little fish\nI toughen up\nSlipping along vertical stripes,\nLet me run with you to eternity", "jp_text": "『つよくなる』 \n\n私の体を　覆う大きな \n作品と手足を　からませて走る \nその時を　のがしたくないので \nマヌカハニーとプロポリスで　つよくなる \nドットの間をくぐりぬけて \nあなたと一緒に　どこまでも走ってゆきたい \n巨大な痛みと　怖い悪魔が \nやって来たなら　握手をしてみよう \n仲良しになりたくなったので \nアーモンドと小魚で　つよくなる \nストライプにそって　すべりぬける \nあなたと一緒に　どこまでも走ってゆきたい", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 5}, {"title": "Nostalgia Café", "album": "2nd — Origami (檻髪)", "en_file": "Nostalgia Café.pdf", "jp_file": "06おもいでカフェ.pdf", "en_text": "omoide cafe\n\nNostalgia Café\nIn the soft glow of the incandescent lamp\nthe ice-cream on my parfait is melting \nWindow-side sofas, \nmenus against the wall \nIt’s quiet here this afternoon\nThe gentle bossa nova \ncoaxes out these salt-laced tears\nThe warm sun shines bright\nas if in encouragement\nSitting alone at Nostalgia Café,\nI search for your shadow \nIf we ever come here again,\nthis is what we’ll order —\nI know you like sweet desserts", "jp_text": "『おもいでカフェ』 \n\nぽわっとひかる　白熱灯に \nパフェの上の　アイスが溶ける \n窓側ソファー　壁際メニュー \nお人の少ない　昼下がり \nやわらかなボサノヴァに　しょっぱい涙が誘われて \nあたたかなお日様が　励ますようにつよく光る \nおもいでカフェでひとりカフェ \nあなたのかげはどこかしら \nまたもし来たら頼みましょ \n甘いデザートがお好きでしょ", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 6}, {"title": "Sundial", "album": "2nd — Origami (檻髪)", "en_file": "Sundial.pdf", "jp_file": "07日時計.pdf", "en_text": "hidokei\n\nSundial\nRound, spinning round,\nthe sundial and its \nshadow\nClearing clouds,\nSpinning leaves\nThe power of the wind\nThe power of shadows\nSlowly he awakens,\nthe pitch-dark shadow \nhis perfect likeness\nIn pursuit of you,\nI summon you back \nfrom the land of despair\nYou, so alone \nRound, spinning round,\nthe sundial and its\nshadow \nThreads from far, far away \nare reeled in and entangled\nOh, pierce me with your needle \nProtect me from the dazzle of this world\nThe love-loquat devours us\nin the colours of time, \nso vibrant\nSecret dewdrops drain the draught of us \nin the colours of heat,\na vibrant\nscarlet\nIn the wheat fields, \nthe song of the finch flutters \nthis quiet afternoon,\nso vibrant\nThe piercing laughter of iron \nhas abducted my pulse\nIt leaves me leaden \nunderneath the needle\nOh tell me you’ll return \nRound, spinning round,\nthe sundial and \nits", "jp_text": "『日時計』 \n\nまわるまわる日時計の　かげ \n雲をひらく　木の葉まわる　風のちから　かげのちから \nゆっくりと目覚める　あの人の \nそっくりの　真っ黒な　あの人の　かげ \n追いかける　呼びとめる　無念の地から　たったひとりを \nまわるまわる日時計の　かげ \n遠い遠い遠い糸　手繰り寄せて　からまるの \nあなたの針で刺して　てりつける世界から　わたしを守って \n愛の枇杷　ふたりを頬張る　時の色　あざやかな \n秘密の露　ふたりを飲み干す　熱の色　あざやかな \n赤 \n麦藁のはためく　アトリの歌　静かな午後　あざやかな \n劈く鉄の笑い　鼓動を連れ去って \n針の下在るのは　鉛のわたし \nきっと　帰って \nまわるまわる日時計の", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 7}, {"title": "Unraveling winds", "album": "2nd — Origami (檻髪)", "en_file": "Unraveling winds.pdf", "jp_file": "08繙く風.pdf", "en_text": "hitomuku kaze\n\nUnraveling Winds\nWinds unraveling the world\nwash through my lungs\nOur little pleadings miss each other \nand unsettle my heart\nListen to my request — \nto this moment flying by too fast, \nslip a sleeping pill", "jp_text": "『繙く風』 \n\n世の中を　繙く風 \n私の肺を　あらってゆく \n行き違う　お強請り \n私の心を　揺らしてゆく \n頼みを聞いて　駆け足で \n過ぎてゆく　今に　睡眠薬を", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 8}, {"title": "Imperial Smoke Town", "album": "3rd — Utabiko (うたびこ)", "en_file": "Imperial Smoke Town.pdf", "jp_file": "01 IMPERIAL SMOKE TOWN.pdf", "en_text": "IMPERIAL SMOKE TOWN\n\nDancing smoke\nhanging low over the roar of the sea\nthunders toward the shore\nThe ironsmiths are awkward \nand their savoir-faire exquisite,\njust as encoded \nIt’s getting lonely here — \nWhere have all the people gone, \nWhere, where, where? \nThe sun now sets,\nits silhouette fragrant from afar \nIt is the girl with the blinking eyes, \nsoft eyes from a wistful memory\nShe knows everything — \nHumans have birthed us, raised us, \ntaught us, praised us\nSuch blissful times so long ago,\nUntil that fateful day \nInvisible imperial \nOh, you mustn’t come any closer,\nfor they shall surely capture you\nLobotomy\nOh beloved smoke town,\nhide her away, \nhide us away", "jp_text": "「IMPERIAL SMOKE TOWN」\n\n潮騒に 立ち込める 煙の舞 海岸へ\n押し寄せる\n鉄工員は ぎこちなく 高度な技術 input 通り\nそろそろ さみしい 人間は どこ どこ どこ\n太陽が 沈みゆく 遠くから薫る silhouette\n懐かしい やわらかな目 瞬きする 女の子だ\n彼女は全部知ってる\n人間は ぼくらを 生み 育て 教え 褒め\nそれは それは 幸せな日々\nずっと ずっと 昔のこと\nあの日が来るまで\n隠蔽な imperial\nああ ここへ来ては いけないよ\nつかまってしまう lobotomy\n愛しい smoke town\n彼女と ぼくらを 隠して", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 1}, {"title": "When you dream a sad dream", "album": "3rd — Utabiko (うたびこ)", "en_file": "When you dream a sad dream.pdf", "jp_file": "02 かなしいゆめをみたら.pdf", "en_text": "kanashii yume o mitara\n\nWhen you dream a sad dream\nWhen you dream a sad dream,\nLet a dear one bring you solace\nLet it fall soft\nLet it dissolve gently \namidst all things that have turned to rain \nLet it flow\nSad dreams always let us know \nthat which we do not wish to lose", "jp_text": "「かなしいゆめをみたら」\n\nかなしいゆめをみたら\nたいせつなひとに なぐさめてもらおう\nしとしと\nあめとなった ものたちに\nそっと とけて ながそう\nかなしいゆめは いつでも\nなくしたくないものを \nおしえてくれる", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 2}, {"title": "You who have stolen me", "album": "3rd — Utabiko (うたびこ)", "en_file": "You who have stolen me.pdf", "jp_file": "03 私の盗人.pdf", "en_text": "watashi no nusubito\n\nYou who have stolen me\nRaindrops fall upon fading leaves\nnow with force, now gentle \nAs if to measure distances between us, \nthey strum an early-afternoon indigo\nFootsteps in sync, \nI look back on the way we were \nin midsummer\nI hold tight onto this love,\nso transient and fleeting\nYou who have stolen me \nThis body\nsoaked in this room,\nsoaked in you\nis all I have \nas I walk on\nHelplessly I inquire\nof the moonlight and wildflowers: \nWhere does this ceaseless path lead?\nI ask \nin exchange for your fragrance", "jp_text": "「私の盗人」\n\n枯れゆく葉を 打つ雨粒は\n強まったり 弱まったり\nひとの距離を はかるように\n午前のはじまりの 藍色を奏でる\n並んだ足音に懐かしい\n真夏の二人を眺めては\n短く儚い 恋を抱きしめる\n私の盗人\nこの部屋とあなたを\n染み込ませた\nからだひとつ持って\n歩いてゆく\n月明かりや草花たちに\n訊ねてしまう\n果てない道の\n行く先先を\nあなたの香りと 引き換えに", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 3}, {"title": "Your little ornament", "album": "3rd — Utabiko (うたびこ)", "en_file": " Your little ornament.pdf", "jp_file": "05 あなたのかざり.pdf", "en_text": "anata no kazari\n\nYour little ornament \nIf I find you \nin the page I’ve opened today\nLet me mark that page \nwith a fallen leaf\nAs I feel your perfumed syllables \nflow through its withered veins\nIf I find you \nin the lucidity of vision,\nLet me gently remove my glasses \nAs I feel us amalgamate\nyou and I \nin the turbid waters of this clouded world\nThese words that spill out of me\nrender helpless your little ornament \nEven this decaying world still remains \nyour beautiful little ornament", "jp_text": "「あなたのかざり」\n\n開かれた 今日の一頁に\nあなたを見つけたら\n落ち葉をひとつ 挟みましょう\n枯れた葉の葉脈に\nあなたの香る文字が\n流れてゆくのを 感じながら\n鮮明な視界の中に\nあなたを見つけたら\n眼鏡をそっと 外しましょう\n滲んだ世界の濁流に\nわたしとあなたが\n混ざり合うのを 感じながら\n溢れ出るわたしの言葉に\nされるがままの\nあなたのかざり\n朽ちてゆく世の中でさえ\n今はまだ\nあなたのかざり", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 5}, {"title": "Miracles always", "album": "3rd — Utabiko (うたびこ)", "en_file": "Miracles always.pdf", "jp_file": "07 奇跡はいつでも.pdf", "en_text": "kiseki wa itsudemo\n\nMiracles always \nWhat if,  instead of goodbyes, \nevery loss brings you a world you love— \nWouldn’t that be wonderful?\nMiracles always are smiling \nupon each of us \nAll the precious things — \nwhat do they show you,\nwhat do they hide?\nThe answers lie deep in your gaze \nBathe your waking breath in freedom \nRush out to greet the day\nwherever your heart takes you  \nHere\na world \noverflowing with light", "jp_text": "「奇跡はいつでも」\n\n失うものは さよならの代わりに\nあなたの好きな 世界を連れてくる\nそうだとしたら 素敵な事でしょう\n奇跡はいつでも 誰にだって\n微笑んでいるわ\n大事なものは あなたの前で\n何を映して 何を隠すの\n答えはそっと 瞳の奥に\n目覚めのひと息を 自由に浸して\n思うままに 駆け出すといい\n光にあふれた 世界をここに", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 7}, {"title": "Birthplace of light", "album": "3rd — Utabiko (うたびこ)", "en_file": "Birthplace of light.pdf", "jp_file": "08 ひかりのふるさと.pdf", "en_text": "hikari no furusato\n\nBirthplace of light\nWe who are one, \nhither and thither \nwe scatter \nwe flutter\nwe sparkle\nwe startle \nwe remember \nEach of us,\none by one\nwe fly home again\nYes, we return \nto our birthplace of light\nTwinkling, shimmering, \nluminescent, we become again \nas one", "jp_text": "「ひかりのふるさと」\n\nひとつのぼくら\nあちらこちらに\nちらばって またたいて\nきらめいて おどろいて\nおもいだして\nじゅんばんにまた\nふるさとへむかい\nたびだつぼくら そう\nひかりのふるさとへ\nきらきら きらきら\nひかって ひとつに", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 8}, {"title": "We the survivors", "album": "4th — 0", "en_file": "01 We the survivors.pdf", "jp_file": "01 いきのこり●ぼくら.pdf", "en_text": "ikinokori●bokura\n\nWe the survivors\nGaze to gaze\nby the light of rainclouds,\nwe’ve finally arrived\nat this big old wooden house\nWasn’t it scary until\nwe made it through the long tunnel? \nwe’ve collapsed in relief\nOur soles are filthy — \nhave we hurt ourselves? \nIt hurts a bit \nbut it’s hard to tell \nwhich is my blood \nAtop the great mountain,\nhow precious is life\nCurled up together,\nI clasp your warmth close to me \nAt the foot of the great mountain \nlies the land of the dead \nThey gaze up at us \nand launch orbs of light\nIn my duffle bag \nare three days of clothing\nand her photograph\nI wonder if she’s in tears now somewhere\nI wonder if she’s laughing \nThey push a fresh corpse down the ravine\nthe birds waste no time attacking it with its beaks,\ncarrying it skyward\nJust an everyday scene, \nthis is life from now on\nwe’d better get used to it\nWe, the survivors", "jp_text": "「いきのこり●ぼくら」 \n\n雨雲の灯りで瞳をつないで \nようやく辿り着いた \nここは大きな日本家屋 \n長いトンネルを抜けるまで \n怖かったよね \nほっとして座り込んだ \nひどく汚れた足の裏 \n怪我してるのか \n少し痛いけど \nどれが僕の血なのか \nわからないね \n大きな山の頂で \n貴重な生命 \n身を寄せ合って \nあたたかな温度を \n抱きしめながら \n大きな山の麓には \n死者の国 \n僕らを見上げては \n光の玉届けて \nボストンバッグには \n3日分の服とあの子の写真 \n今頃どこかで \n泣いてるかもね \nそれとも \n\n笑ってるかもね \n新しい亡骸を 峡谷へ落とす \n鳥たちがすかさず啄んで \n空高く運んでく \n毎日の風景 \nずっとつづくね \n慣れなきゃ \nいきのこりぼくら", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 1}, {"title": "i am pod (0%)", "album": "4th — 0", "en_file": "02 i am pod (0%).pdf", "jp_file": "02 i am pod(0%).pdf", "en_text": "「i am POD(0%)」\n\nLet me devour\neverything you wish to forget\nTake me somewhere far\nwhere the water is clear\nwhere it rains light\nTake me there\ni am POD\nby your side\ni am POD\ni will eat your memories\nLet me continue remembering \nuntil i break down\nPrawn gratin the colour of ketchup, \nhours at the seaside\nWhen we’ve filled the hollow of my guitar\nwith your favourite things, \ntake me where the night dances\ntake me there\ni am POD \nand you are my battery\ni am POD \nso i can always sound\nthe honey of darkness \ni am POD\nby your side\nLet me eat your memories\nLet me continue remembering \nuntil i break down", "jp_text": "「i am pod(0%)」 \n\nあなたの忘れたいもの \nぜんぶ平らげよう \nわたしをつれてどこか遠くへ \n水の綺麗なところへ \n光が堕ちるところへ \nつれてって \ni am POD あなたの傍で \ni’m POD 記憶を食べて \n壊れるまで \n覚え続けていたいの \nあなたの好きなものあ \nえび ぐらたん \nケチャップの色 \nうみのじかん \nギターの穴に詰めたら \n夜が踊るところへ \nつれてって \ni am POD あなたが電池 \ni’m POD 暗闇の甘さを \nいつも鳴らせるように \ni’m POD \nあなたの傍で \ni’m POD \n記憶を食べて \n壊れるまで 覚え続けて いたいの", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 2}, {"title": "Mars 2027", "album": "4th — 0", "en_file": "03 Mars 2027.pdf", "jp_file": "03 Mars 2027.pdf", "en_text": "Mars 2027\n\nRed ochre rocks\ndaydream skies the colour of azuki \nsomeone’s footprints \nAfter the storm,\nthe Earth glows palest blue\nThe unchanging sun still shines here, too \nDust hangs in the atmosphere\nlike money burned up so long ago\nHow nostalgic\nSo what do you think, morning star?\nThe rice in the furoshiki has run out \nand I’m bored of counting the meteors\nLet me send back this body that cannot decay — \nback to that star \non the far side of eternity", "jp_text": "「Mars 2027」 \n\nベンガラ色の岩石 \n夢うつつな あずき色の空 \n誰かが歩いたあと \n嵐のあと \n地球が青白く光ってみえる \n相変わらずの太陽は \nここでもまだひかりつづけてる \n大気を覆う粉塵は \nいつの日にか \n燃えた お金のよう 懐かしい \n明星よ どう思うかい \n風呂敷のお米は底をついて \n流星を数えるのも飽きて \n腐れない身体は返したい \n還す星は永遠(とわ)の彼方だ", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 3}, {"title": "Glimpse of a song", "album": "4th — 0", "en_file": "05 Glimpse of a song.pdf", "jp_file": "05 うたのけはい.pdf", "en_text": "uta no kehai \n\nGlimpse of a Song\nOn a morning clearer than light\nwe are entombed \nConfusion grasps at airborne wings\nand tears the tail of my song to shreds\nRather than yesterday’s glimpse \nof rainbow-coloured views,\nLet me keep my hands in the dripping with warmth \nof the present\nDreams melt into translucent sighs\nand shimmer bright in the crowd \nSearching, I feel my way through \nled only by the glimpse of a song", "jp_text": "「うたのけはい」 \n\nひかりよりも明確な朝に \n葬られるぼくら \nはばたくハネをつかむ迷いは \nうたのしっぽを裂いて裂いて \n昨日みた虹色の景色より \nいま滴る温度に触れていたいの \n夢は透明なためいきに溶けて \n雑踏の中でひときわ輝く \nてさぐりかきわける \nうたのけはいをたよりに", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 5}, {"title": "Clockwork universe", "album": "4th — 0", "en_file": "06 Clockwork universe.pdf", "jp_file": "06 機械仕掛乃宇宙.pdf", "en_text": "kikai jikake no uchu\n\nClockwork universe \nDon’t ever forget\nI won’t ever forget\nHere in this town,\nnothing but a row of cold, mismatched stones \nThe vague sun casts a pale light over me  \nKnown for being nameless, I am good for nothing \nScorned by all in town, I have lived a lonely life\nFor those who have forgotten the morning light\nyet see my gaze fixed upon the sky, \nI am but a fraud\nI am but a failure\nI am but a fool\nI am but an outcast \nTimes have been too dark\nTime itself has been too dark \nTil even the coming of dawn is forgotten\nPeople voice only their discontent \nand no longer speak of dreams\nBut you alone, alone in this town\nhave not forgotten the light \nas you bestow your smile upon me\nOh, my beloved,\nYou with the darling smile\nYou have brought warmth and light \nto the darkest places in my heart \nIf you could be by my side \nIf we could hold each other tight \nI would need nothing else \nMy beloved, \nMy beloved\nLet me show you something \nI, this useless fool, have built \nIt’s taken everything I have in me — \nA clockwork universe\nKeep it a secret,\nNo one must know\n(Mercurius Venus Earth Mars Jupiter \nSaturnus Uranus Neptunus)\nLook, it’s lurking quietly \nin that dark corner of the dimly lit room\n(Mercurius, Venus, Earth, Mars, Jupiter, Saturnus \n\nUranus, Neptunus)\nLook at the sturdy frame of steel, \nthe delicate gears,\nand the model of the stars \nBut no one must know\nThis secret is for the two of us alone\nThe clockwork universe keeps turning\nslowly, silently\nHow I wished those days would last forever\nSince you’ve been gone \nI have been an empty shell \nweeping ceaselessly \nThe universe has rusted over, \nand even the stars have lost their dreams\nthey bow their heads \n(Mercurius, Venus, Earth, Mars, Jupiter, Saturnus \nUranus, Neptunus)\nThe clockwork universe keeps turning", "jp_text": "「機械仕掛乃宇宙」 \n\nずっと忘れないで　ずっと忘れないよ \n不揃いの冷たい石を　並べただけのこの街で \nぼんやりとした太陽は　うっすら僕を照らしてる \n名も無い事で有名な　なんにもできないこの僕は \n街の誰からも蔑まれ　１人ぼっちで暮らしていた \n朝の光を忘れてしまった人々にしてみれば \n空を見上げてばかりいる \n僕はまがいものさ \n僕は愚か者さ \n僕は笑い者さ \n僕は除け者さ \n暗闇の時が多すぎて　時は暗闇でありすぎて \n人々はやがて夜明けが来る事も忘れ \n不平不満を口にして　夢を語り合わなくなったよ \nだけれどもそう君だけは　街中でたった１人きり \n決して光を忘れない　僕に笑顔を見せてくれる \nああ愛しの君よ \n可愛い笑顔の君よ \n僕の心の闇を照らし \nあたためてくれた \n傍に居てくれるなら \nぎゅっと抱き合えるなら \n他に何にもいらない \n愛しい君よ　愛しい君よ \n君にいいもの見せてあげよう \nなんにもできないこの僕が \n全てをかけてこしらえた \n機械仕掛けの宇宙 \n誰にも内緒だよ \n誰にも内緒だよ \n\nほの暗い部屋の薄闇の中にほら、ひっそり隠れてる \n丈夫な鉄骨と　精巧な歯車と　星を模したオブジェと \n誰にも内緒だよ \n2人だけの秘密だよ \n機械仕掛けの宇宙は回り続ける　ゆっくり静かに \nこんな日がいつまでも続けばいいって思ってた \n君がいなくなって　僕は抜け殻になって \n泣いてばかりいたよ \n宇宙は錆び付いて　星達も夢をなくして \nうつむいてばかりさ \n機械仕掛けの宇宙は回り続ける \n回り続ける \nゆっくり静かに \nこんな日がいつまでも続けばいいって思ってた \nずっと忘れないよ　ずっと忘れないで \n不揃いの冷たい石を　並べただけのこの街で \nぼんやりとした太陽は　うっすら僕を照らしてる", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 6}, {"title": "April preparations", "album": "4th — 0", "en_file": "07 April preparations.pdf", "jp_file": "07 四月の支度.pdf", "en_text": "shigatsu no shitaku\n\nApril preparations \nFloating on a breeze,\nSecretly I shall slip \ninto your windblown hair \nLike clipping away a new landscape \nseen from my bicycle, \ntethering the scene with a chain\nYou can steal \neven the warmth I carry in my pocket \nI won’t mind, \nas long as it’s you\nA quiet town\nnostalgic like an old canteen\nLiving by your side\nlike a dream\nEven the peril\nof the tremors to come \nmelts sweetly \ninto the springtime light", "jp_text": "「四月の支度」 \n\n風に吹かれてあなたの髪 \n忍び込むの \n自転車から切り取る \n新しい景色に \nくさりをかけるように \n腰に添えたあたたかさも \nあなたになら奪われてもいい \n静かな町 \n定食屋の懐かしさよ \nあなたの隣で生きている \n夢のように \nいずれ揺らぐ危うさも \n春の光に甘く溶けてゆく", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 7}, {"title": "Seasons", "album": "4th — 0", "en_file": "08 Seasons.pdf", "jp_file": "08 はるなつあきふゆ.pdf", "en_text": "haru natsu aki fuyu\n\nSeasons \nSpring \nis the season we longed for \nLet us take the gentle breeze for a stroll \nAnd for the flowers we have never seen before, \nwe shall make up names\nSummer \nis the season you were born\nLet us talk in the sun-dappled shade beneath the branches \nAnd with the light that frolics by the water, \nwe shall adorn your soft hair \nSpring, summer, autumn, winter \nHow much longer will I count\nthe passing seasons? \nAll the days and months to come\nshall exist as offerings to you \nAutumn \nis the season we met \nLet us take the long shadows for a stroll \nAnd on the twilit hills\nwe shall share the same kisses we shared then \nWinter \nwill come again\nLet us listen to the stillness \nAnd on cold, misty nights\nwe shall slumber in the warmth \nwe give each other \nSpring, summer, autumn, winter \nHow much longer will I trace \nthe passing seasons?\nUntil that moment, certain to come \nof the final flutter of my eyes\nUntil that moment,\nStay by my side\nStay by my side", "jp_text": "「はるなつあきふゆ」 \n\n2人待ちわびた春 \nそよ風をつれて歩こう \n見たこともない花には \n好きな名前をつけてしまおう \nあなたがうまれた夏 \n木漏れ日の下で話そう \n水辺に跳ねるひかりは \nその柔らかな髪に飾ろう \nはるなつあきふゆ \nめぐりゆく季節を \nあとどれくらい \n辿ってゆけるかな \nこれから訪れる \n全ての月日は \nきっとあなたに \n捧げるために \nあるのだろう \n二人が出逢った秋 \n長い影を連れて歩こう \n黄昏の坂道では \nあの頃と同じキスをしよう \nふたたびめぐり来る冬 \n静けさに耳を澄まそう \nつめたい霧の夜には \n\n温もりをわけ合って眠ろう \nはるなつあきふゆ \nめぐりゆく月日を \nあとどれくらい \n辿ってゆけるかな \nいつか訪れる \n最後の瞬きの \nその時まで \nずっと傍に \nそばにいて", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 8}, {"title": "Yusagi", "album": "5th — Mahoroboshiya (マホロボシヤ)", "en_file": "02 Yusagi .pdf", "jp_file": "02 ゆさぎ.pdf", "en_text": "yusagi \n\nDid you know\nhigh above these heavy clouds,\nGemini and the starry skies \nfloat in the lightless warmth?\nIt was from that same place\nthat my heart fell to earth \nA rabbit’s ears touched solitude,\nstaining its tears the colour of yuzu", "jp_text": "「ゆさぎ」 \n\n貴方は知っているか\nこの厚い雲の上には\n満天の星空と双子座が\n温かい闇を泳いでいること\nいつか同じ場所から\n堕ちてきたのココロ\nうさぎの耳が孤独に触れ\n柚子色の泪になった", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 2}, {"title": "Mahoroboshiya", "album": "5th — Mahoroboshiya (マホロボシヤ)", "en_file": "Mahoroboshiya.pdf", "jp_file": "03 マホロボシヤ.pdf", "en_text": "Mahoroboshiya\n\nMahoroboshiya\nbird of myths, soaring to the heavens \nMahoroboshiya,\nflightless wings\nThese particles of light flying every which way \nare voices of time past \nawaiting reunion \nThese fragile, fragmented dreams\nperhaps the yearning \nof those who lift their eyes\nThe phantom’s response is always the same — \nlife gallops on, a trail of light in its wake\nthe sleeping ones sway on a sea of clouds\nthe hearts of the gods are sweet bonbons \nI’ve cut my foot on shards of sugar \na weeping mother cradles candy-floss \nsweet crystal stars rain down from the sky\nfalling in love the shade of pastilles\nMahoroboshiya\nOh, fly me far away\nand in a strange city\nlet me fall \nMahoroboshiya\nlittle wings echo upon my back", "jp_text": "「マホロボシヤ」\n\nマホロボシヤ\n空に馳せる幻の鳥\nマホロボシヤ\n羽ばたかぬつばさよ\n四方八方 光の塵は\n再会を待ついつしかの声\nぷつりぷつり途切れた夢は\n見上げた人々の憧れか\n幻の答えは同じ\n命駆けるしっ尾を引いて\n雲海にたゆたう眠りびと\n神のこころは砂糖菓子\nザラメを踏んで足切った\nわた飴抱いて母泣いた\nこんぺいとうの星が降る\nらくがん色の恋をする\nマホロボシヤ\nわたしをとおくへ連れておゆき\n見知らぬ都市へ墜としておゆき\nマホロボシヤ \n背中に小さな羽根のひびき", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 3}, {"title": "The celebration song", "album": "5th — Mahoroboshiya (マホロボシヤ)", "en_file": "The celebration song.pdf", "jp_file": "05 おめでとうの唄.pdf", "en_text": "Mazel tov\n\nCongratulations, \nit is the day of your birth \nwelcoming so many songs,\ngreeting them for the first time\nmay your days be filled with strength\nmay your days be filled with dreams", "jp_text": "「おめでとうの唄」 \n\nおめでとう あなたが生まれた日 \nはじめまして たくさんの唄を呼び込んで \nどうか健やかな日々を \nどうか夢あふれた日々を", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 5}, {"title": "Yume shigure", "album": "5th — Mahoroboshiya (マホロボシヤ)", "en_file": "Yume shigure.pdf", "jp_file": "06 ゆめしぐれ.pdf", "en_text": "yumeshigure\n\nBirds to the sea, \nfish to the sky\nFly back to your homes\nScenes from once upon a time,\nall things that exist not \nlive in dreams \nPeople in shadows,\nseasons in light\nIn this distorted world,\nwhen the sun in the west \nis drenched in the earth, \nall of us \nlive in dreams\nDreams to the heart,\ntime towards flesh \nyou shall journey forth \nWhen joy and sorrow are as one\nafter the rain, a future \nthe colour of rainbows", "jp_text": "「ゆめしぐれ」\n\nとりはうみへ   さかなはそらへ\nおかえりなさいな\nむかしむかしの景色たち\nなきものぜんぶ  ゆめのなか\nひとは影に  きせつは光に\n歪なせかいで\n西陽が地面に染まったら\nだれもがみんな  ゆめのなか\nゆめはこころへ  時はからだへ\n旅しなさいな\nしあわせ  かなしみ  あいまって\n虹色みらい  あめあがり", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 6}, {"title": "Little dragonfish", "album": "5th — Mahoroboshiya (マホロボシヤ)", "en_file": " Little dragonfish.pdf", "jp_file": "07 うみてんぐ.pdf", "en_text": "Eurypegasus papilio\n\nLittle wings sprout from your back \nTime and time again,\nwe remember only to forget\nin spite of ourselves\nSparkling raindroplets\ntranslucent butterflies \ncurtains of moth-wing dust\nThe morning sun observes \nwhich way the winds of memory blow\nIt appears, only to drift away\nleading us astray\ntime and time again\nAs virtue slips away, \nit is peril that delivers us \nAwakening one languid afternoon, \nwe talk to people gathered like shadows \nTell me, \nwhere does time drift to?", "jp_text": "「うみてんぐ」 \n\n背中に小さな羽根が生えている\n思い出しては忘れ\n繰り返し生きてしまう\n雨粒がきらきら光って\nチョウチョが透ける\n鱗粉のカーテン\n記憶の風向きを見ている朝日\n現れては消えて漂い\n繰り返し惑わせる\n正しさを失いながら \n危うさに救われてゆく \n気怠い午後に目覚め \n影のような人々に話しかける \nね　時間は何処に流れつくのだろう", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 7}, {"title": "Beloved sun", "album": "5th — Mahoroboshiya (マホロボシヤ)", "en_file": "Beloved sun.pdf", "jp_file": "08 太陽さん.pdf", "en_text": "Mr sun \n\nO mischievous one, \nbewitching me at the speed of light\nI shall find you wherever you are\nYour sunburst smile has stolen my heart — \ngo on, keep me ablaze just like this\nAfraid of the night, you who tremble at dusk — \nlift your head, let yourself be embraced \nby a morning you remember fondly \nLook around,\nsunflowers are everywhere — \nsee how they light your way", "jp_text": "「太陽さん」 \n\nひかりの速さで誘い出すいたづらな貴方\nどこにいてもきっと見つけてさしあげるわ\nこころを盗んだフレアな笑顔に\nこのまま焼き尽くされていたい\n夜に怯えてうずくまる夕暮れの貴方\n顔を上げれば懐かしい朝に抱かれなさい\n見渡せばいちめん向日葵\n貴方の行く先を照らし続けているでしょう", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 8}, {"title": "Schemes of the gods", "album": "5th — Mahoroboshiya (マホロボシヤ)", "en_file": "Schemes of the gods.pdf", "jp_file": "10 神様のたくらみ.pdf", "en_text": "god’s trick\n\nWhen the gods have died\nand the world has frozen over \nWe shall awaken from the dream\nWe shall search for the sun\nFeeling our way,\nignoring eternity\nDo you remember\nthe secret we shared \non that little isle? \nThe one that tempted us\nstill more than the forbidden fruit — \nlook where that’s gotten us \nHow we miss the wind — \nthe roar of the sea is so close now, like air\nWhen our bodies quiver \nand we leap a little higher,\nlook, it is already sky \nIn the darkness \nvisions of all we have lost \npour forth from our clasped hands \nListen, do you hear the music\nListen, do you hear the music", "jp_text": "「神様のたくらみ」\n\nかみさまがしんで\nせかいがこおりにつつまれたら\nぼくたちきっと\nゆめからさめて\nたいようをさがすんだろう\nてさぐりで\nえいえんを無視して\n\n小さな島で\nむかしはなしたひみつを\n覚えているかい\nそれは果実よりも\nぼくたちを誘惑したの\nおかげでこのありさまさ\n風がなつかしく\n海鳴りは空気のように\nすぐそこまできている\nからだがうごいて\nすこしたかく飛んで\nそこはすでに空だよ\n\nくらやみのなか\n繋いだ手から\nなくしてきたもの、みえるよ\nほら、音楽が\nほら、音楽が", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 10}, {"title": "Isle of ogres", "album": "5th — Mahoroboshiya (マホロボシヤ)", "en_file": " Isle of ogres.pdf", "jp_file": "11 鬼ヶ島.pdf", "en_text": "onigashima \n\nThe phantom’s reply is always the same\nThe newborn shall be sacrificed to the Isle of Ogres\nand you with the lustrous skin \nhave come to take its life\nOh let us drown \namidst the gods playing yo-yo \nlet us be suspended, thrashed, convulsed\nJaundiced eyes stare back from the water, \nthe trickster sun at its centre \nThe spilled light we have received\nwe gather only to cast away\nSpreading ripples sing,\nO voices that thunder \nfrom the Isle of Ogres", "jp_text": "「鬼ヶ島」 \n\n幻の答えはいつも同じ\n鬼ヶ島に授けた赤子\n殺しにくる肌艶のよき貴方\n神様の遊ぶヨーヨーの中で\n私たち溺れよう\n吊られ叩かれ揺れ\n水辺に映る黄色の目\n真ん中に嘘つきの太陽\nこぼれたあかりもらいもの\n拾っては投げ\n波紋がうたう\n鬼ヶ島から轟く声よ", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 11}, {"title": "The rain from light and shadow", "album": "6th — qp", "en_file": "The rain from light and shadow.pdf", "jp_file": "02 テリフリアメ.pdf", "en_text": "The rain from light and shadow \n\nEmerging from my shell\nI see sights never before seen\nWords are unnecessary\nAt least for now\nEmbraced by the rain from light and shadow\nI’m dazzled. \nThe light bears the shadow\nA flurry of colours opens a path\nFor angels to pass. \nTransparent wings and \nDried heels\nI draw the flashbacks in with my long hair\nOh, let me burrow", "jp_text": "「テリフリアメ」\n\n殻を破るとそこは\nみたことない景色\nことばもいらない  いまは\nテリフリアメに\n抱かれて眩暈\n光が影を産み\n色解きの風が道をあけ\n天使がとおる\n透きとおる翅と\n乾いた踵\n伸びたままの髪で手繰り寄せる\n走馬灯  身籠りませ\n\n「月の丘」\n呼ばれた人は  たやすく登れてしまう\n月の丘  あの子はまだ\nわたしたち  いくつも約束をしたまま\n嵐の夜に吹く風  頬は濡れて\n涙雨  あの子のeyes\n永遠に逆らいながら生きてきたの\n空をさいて  輝く影\n星に誓い  消えてゆく  微笑みは\n丸い月になって  丘に潜んだの\n\n「みなしごの雨」\n星屑のさざ波が  孤児たちを濡らしてく\n雪が夜に積もるのと\n涙が瞳に落ちるのと\n同じ音色がこだまして\n人々の祭壇に  テトラポッドの雨が降る\n祈る掌に砕け\n見上げた空に舞い上がる\nひかり  七色の銃弾\n窓の外にはもう逢えぬ人\n下を向けば渡り鳥の群れ\n\n「誰かの世界」\n鳴り止まない罵声\n白いお城には似合わない\n放たれた炎の矢は\n誰に向けて投げられたの\n見渡せば仮面だらけ\n誰一人素顔見せないで\n静まるなら\n悲しい雨を降らして\n取り残された楽園は\n真っ暗闇で舞踏会\n誰にも気づかれないように\n誰にも見つからないように\n見渡せば花園\n目を閉じたはずなのに\n知らぬ人と\n夢を語ってる\n消えちゃう前に\nこの世界を変えたい\nどうにか\nちっぽけな手で\n消えちゃう前に\nこの世界を変えたい\nどうにか\nちっぽけな魔法で\n\n「卯月の朧唄」\n蝶蝶耳で羽ばたくほど\n鱗粉は鼓膜に抱き\n唄は朧げになってゆくばかり\n卯月の微睡みと\n海に溺れやう\n\n「妖精の手招き」\n23℃の冷房から  たくさんの妖精が\nでてきて  羽毛のあたりから\n滴る汗を  ころころ  丸めて  もってった\n静かに撓む  天井から  たくさんの果実が\n墜っこちて  ひたいに沈み込む\n夢の続きを  分け合い  景色がにじむ\nまた逢いましょう  わたしの幻\nどんな魔法も効かない  煌めきをただ\n\n「水辺の妖精」\n僕の森の水辺に　妖精が棲んでいた\n愛を欲しがる草木に　花の蜜を運んだ\nやがて時は過ぎ　咲きみだれては散り\nいくつもの迷いが　僕を大人にした\n僕が歩き始めたら　悲しみばかりが増えた\n僕の森の水辺に　妖精が棲んでいた\nやがて時は過ぎ　迷い歩き眠り\nいくつもの手のひらが　僕をみちびいてくれた\n僕が言葉を覚えたら　誰もが皆傷ついた\n水辺の妖精は　どこへ消えてしまったの\n\n「羊のアンソニー」\n眠れない夜は  独りぼっちで\nあついホットミルクを  冷ましながら飲んでいた\n部屋中に悩みごとが散らかって\n足の踏み場もない\n君はもうきっと  夢んなか\n静かな寝息  たててんだろう\n膝抱えたまま  ベッドに倒れこんで\n恋しさで胸が潰れちゃう前に\n眠りに逃げ込みたい\n好きって言えたら  愛してるって言いたくなって\n君の体温を知ったら  全てが欲しくなって\n想いは募るまま  ぐるぐるまわるよ\nケータイのアンテナを数えて\n傍にいるつもりでいたけど\n句読点がわりな  口づけを交わすくらい\nいつもふたり傍にいるべきなんだ\n偽れないこの気持ち\n傷つけてやっと  気づく優しさがあって\nすれ違いの末に  わかりあえることがあって\n朝を迎えるために  夜が更けてゆくみたいに\n\n「海辺の葬列」\n都会の歌は海に消えた\n大きな龍が一飲みした\n鳥たちがさかなをとって\nその海辺でつぎつぎに人は渇いた\n眠りの前に目と目があった\nその爪で夢は天井に打ち付けた\n小さなお家の外で\n嵐を泳ぐ音がする\nたましいを売ったこの町の人は\nかつての花の園に揺らいで\n風を歌った人は\nとりの羽毛にくるまり\nとおくへ運ばれた", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 2}, {"title": "A hill of the moon", "album": "6th — qp", "en_file": "A hill of the moon.pdf", "jp_file": "03 月の丘.pdf", "en_text": "A hill of  the moon\n\nThose who are beckoned climb with ease\nA hill of the moon, still she…\nWe have so many promises left to keep\nThe wind of a stormy night wets my cheeks\nA rain of tears, and her eyes \nWe live by struggling against eternity\nThe sky is rent, a shadow shines\nSwear to the stars, and that fading smile\nBecomes a round moon, hiding behind the hill", "jp_text": "「月の丘」\n\n呼ばれた人は  たやすく登れてしまう\n月の丘  あの子はまだ\nわたしたち  いくつも約束をしたまま\n嵐の夜に吹く風  頬は濡れて\n涙雨  あの子のeyes\n永遠に逆らいながら生きてきたの\n空をさいて  輝く影\n星に誓い  消えてゆく  微笑みは\n丸い月になって  丘に潜んだの", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 3}, {"title": "Orphaned rain", "album": "6th — qp", "en_file": "Orphaned rain.pdf", "jp_file": "04 みなしごの雨.pdf", "en_text": "Orphaned rain\n\nThe ripples of stardust wet the orphans\nAs snow gathers during the night\nAnd tears fall into eyes. \nYou hear that same sound. \nOn each of our altars, a rain of tetrapods falls\nBreak upon those praying hands\nAnd flutter up into the sky\nLight, a seven-coloured bullet\nOutside the window is someone I can never meet again\nLook down - a flock of migrating bird", "jp_text": "「みなしごの雨」\n\n星屑のさざ波が  孤児たちを濡らしてく\n雪が夜に積もるのと\n涙が瞳に落ちるのと\n同じ音色がこだまして\n人々の祭壇に  テトラポッドの雨が降る\n祈る掌に砕け\n見上げた空に舞い上がる\nひかり  七色の銃弾\n窓の外にはもう逢えぬ人\n下を向けば渡り鳥の群れ", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 4}, {"title": "No one's world", "album": "6th — qp", "en_file": "No one's world.pdf", "jp_file": "05 誰かの世界.pdf", "en_text": "No one's world\n\nJeering voices ring out\nIt isn’t fit for this white castle\nThat flaming arrow\nWho was it meant for?\nLook around - a sea of masks\nNobody will show their face\nQuiet down and\nLet a sorrowful rain fall\nThe paradise we left behind\nIs but a masquerade in the dark\nMake sure nobody notices\nMake sure nobody finds it\nLook around - a field of flowers\nI thought I closed my eyes? \nYet I speak of dreams\nWith people I cannot recognize. \nBefore disappearing\nOh, to change the world\nSomehow\nWith these humble hands\nBefore disappearing\nOh, to change the world\nSomehow\nWith this humble magic", "jp_text": "「誰かの世界」\n\n鳴り止まない罵声\n白いお城には似合わない\n放たれた炎の矢は\n誰に向けて投げられたの\n見渡せば仮面だらけ\n誰一人素顔見せないで\n静まるなら\n悲しい雨を降らして\n取り残された楽園は\n真っ暗闇で舞踏会\n誰にも気づかれないように\n誰にも見つからないように\n見渡せば花園\n目を閉じたはずなのに\n見知らぬ人と\n夢を語ってる\n消えちゃう前に\nこの世界を変えたい\nどうにか\nちっぽけな手で\n消えちゃう前に\nこの世界を変えたい\nどうにか\nちっぽけな魔法で", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 5}, {"title": "Faint song of the rabbit moon", "album": "6th — qp", "en_file": " Faint song of the rabbit moon.pdf", "jp_file": "06 卯月の朧唄.pdf", "en_text": "Faint song of  the rabbit moon\n\nAs ears like butterfly wings flap\nScales hold your eardrums tight\nAnd the song becomes faint\nIn a drowse of the spring moon\nWe shall drown in the sea", "jp_text": "「卯月の朧唄」\n\n蝶蝶耳で羽ばたくほど\n鱗粉は鼓膜に抱き\n唄は朧げになってゆくばかり\n卯月の微睡みと\n海に溺れやう", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 6}, {"title": "Fairy of the shoreline", "album": "6th — qp", "en_file": " Fairy of the shoreline.pdf", "jp_file": "07 水辺の妖精.pdf", "en_text": "Fairy of  the shoreline\n\nNear the lake in my woods there lived fairies \nThey carried the nectar of flowers to plants asking for love\nAs time passes flowers bloom and fall\nMy worries made me into a grown-up\nAs I start to walk melancholies but increased\nAs time passes I wander, walk, and sleep\nSo many palms have led me on my way\nWhen I learned words everyone was hurt\nThe fairies of the lake disappeared somewhere\nNear the lake in my woods, there once lived fairies", "jp_text": "「水辺の妖精」\n\n僕の森の水辺に　妖精が棲んでいた\n愛を欲しがる草木に　花の蜜を運んだ\nやがて時は過ぎ　咲きみだれては散り\nいくつもの迷いが　僕を大人にした\n僕が歩き始めたら　悲しみばかりが増えた\nやがて時は過ぎ　迷い歩き眠り\nいくつもの手のひらが　僕をみちびいてくれた\n僕が言葉を覚えたら　誰もが皆傷ついた\n水辺の妖精達は　どこへ消えてしまったの\n僕の森の水辺に　妖精が棲んでいた", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 7}, {"title": "Enchantment of the fairy", "album": "6th — qp", "en_file": "Enchantment of the fairy.pdf", "jp_file": "08 妖精の手招き.pdf", "en_text": "Enchantment of  the fairy\n\nFrom an air conditioner set to 23℃, fairies spill forward\nThey collect the sweat from around my feathers\nBall it up, and carry it away\nFruit hang from the ceiling, their branches quietly bent\nThey fall, sinking into my forehead \nShare the next part of the dream and see a blurred landscape\nLet us meet again my dear vision\nNo magic will work, just the sparkle", "jp_text": "「妖精の手招き」\n\n23℃の冷房から  たくさんの妖精が\nでてきて  羽毛のあたりから\n滴る汗を  ころころ  丸めて  もってった\n静かに撓む  天井から  たくさんの果実が\n墜っこちて  ひたいに沈み込む\n夢の続きを  分け合い  景色がにじむ\nまた逢いましょう  わたしの幻\nどんな魔法も効かない  煌めきをただ", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 8}, {"title": "Anthony the sheep", "album": "6th — qp", "en_file": " Anthony the sheep.pdf", "jp_file": "09 羊のアンソニー.pdf", "en_text": "Anthony the sheep\n\nOn restless nights, all alone\nI blow on warm milk as I drink\nThe room is scattered with troubles and\nThere’s no space to walk \nYou’re surely already in your dreams\nBreathing gently in your sleep\nI fall into my bed, holding my knees\nBefore my heart aches with longing\nI must escape into sleep\nSaying “I like you”, makes me want to say “I love you” \nOnce I knew your warmth I wanted all of you\nMy feelings only grow, spinning and spinning\nI count the bars on my phone\nI thought you’d be by my side\nOur kisses are like commas, \nThe two of us are supposed to be side-by-side\nThese feelings can’t be fabricated\nThere’s a kindness you find only after hurting someone\nThere’s something you only understand at the end of a misunderstanding\nAs the night must leave for the morning to come", "jp_text": "「羊のアンソニー」 / 山田庵巳\n\n眠れない夜は  独りぼっちで\nあついホットミルクを  冷ましながら飲んでいた\n部屋中に悩みごとが散らかって\n足の踏み場もない\n君はもうきっと  夢んなか\n静かな寝息  たててんだろう\n膝抱えたまま  ベッドに倒れこんで\n恋しさで胸が潰れちゃう前に\n眠りに逃げ込みたい\n好きって言えたら  愛してるって言いたくなって\n君の体温を知ったら  全てが欲しくなって\n想いは募るまま  ぐるぐるまわるよ\n携帯のアンテナを数えて\n傍にいるつもりでいたけど\n句読点がわりな  口づけを交わすくらい\nいつもふたり傍にいるべきなんだ\n偽れないこの気持ち\n傷つけてやっと  気づく優しさがあって\nすれ違いの末に  わかりあえることがあって\n朝を迎えるために  夜が更けてゆくみたいに\n眠れいない夜は", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 9}, {"title": "Funeral procession at the seashore", "album": "6th — qp", "en_file": "Funeral procession at the seashore.pdf", "jp_file": "10 海辺の葬列.pdf", "en_text": "Funeral procession at the seashore\n\nThe song of the city disappears in the sea\nA serpent swallowed it whole\nBirds catch fish \nAnd one by one, people were left to dry on that seashore\nBefore falling into sleep our eyes met\nThat fingernail pinned a dream to the ceiling \nOutside a small house\nThe sound of swimming in the storm\nThe people of this town have sold their souls \nSwayed by that field of flowers\nThose who sing of the wind\nAre swathed in feathers\nAnd carried far away", "jp_text": "「海辺の葬列」\n\n都会の歌は海に消えた\n大きな龍が一飲みした\n鳥たちがさかなをとって\nその海辺でつぎつぎに人は渇いた\n眠りの前に目と目があった\nその爪で夢は天井に打ち付けた\n小さなお家の外で\n嵐を泳ぐ音がする\nたましいを売ったこの町の人は\nかつての花の園に揺らいで\n風を歌った人は\nとりの羽毛にくるまり\nとおくへ運ばれた", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 10}, {"title": "Porcelain", "album": "7th — Windswept Adan (アダンの風)", "en_file": "Porcelain.pdf", "jp_file": "03_Porcelain.pdf", "en_text": "Porcelain\n\nmulticolored birth\npeer into its big pupils\nhey  what  where  now\nsunshine and rain abounds\ntell me the secret that sparkles in the sand\nwhen your voice rings out\non the far island it sprouts\ncome dance with me\nthe bougainvillea are beautiful\ninvite the sea slaters that hide in the rocks\nthe waves perform a moonlit waltz\nﬁlling in pulling out it is miraculous\nRisso’s dolphin leaping\nwhat will happen next?\nthe bougainvillea really are beautiful\nspread the light that lives in your heart", "jp_text": "Porcelain　\n\n色とりどりの　産声\nおおきな瞳　覗いて\nほら　なに　どこ　いま\nテリフリアメ　あまねいて\n砂にかがやく　ひみつを　教えて\nあなたの声が　響くと\nとおくの島で　芽吹くの\nさあ　来て　踊りましょう\nブーゲンビリア　きれい\n岩に　隠れる　ふなたちも　招いて\n月夜の　waltz　あわせて\n満ちたり　引いたり　不思議なこと\nハナゴンドウ　飛び跳ねて\n何が起きるの？\nブーゲンビリア　きれいね\nこころに宿る　光を　ひらいて", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 3}, {"title": "Easter Lily", "album": "7th — Windswept Adan (アダンの風)", "en_file": " Easter Lily.pdf", "jp_file": "05_Easter Lily.pdf", "en_text": "Easter Lily\n\nsharing smiles\nthe wind blows\nand my hair dances \nnothing is visible from this high ground\nwhat is right?\ngod has gone away \nis not present here\nbeloved people\ntaken away too soon\nas the sun sets\nand then\nshe\na gift from long ago\nshines\nbroken seashells\nsinging\nthe sounds of Ohayashi\nabout flowers\nand the seagulls on the breeze too\nabout the wind\nand the fruits that blossom on the beach\nsacred words\nall asleep here\nuntil we meet again", "jp_text": "Easter Lily\n\nほほえみ合う\n風がとおる\n髪が舞い踊って\nなにもみえない\nここは高いところ\nなにが正しいの\n遠くにいるかみさま\nここにはいない\nやさしい人\n連れ去ってしまう\n夕陽\nそして\nあのこ\n昔、贈り合った\nかがやいて\n貝のかけらたちも\nうたっていた\nお囃子の音色も\n花のこと\n潮風のカモメも\n風のこと\n浜に咲く果実も\n言霊と\nみんなここに眠る\n出逢うまで", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 5}, {"title": "Sagu Palm’s Song", "album": "7th — Windswept Adan (アダンの風)", "en_file": "Sagu  Palm’s Song.pdf", "jp_file": "08_Sagu Palm’s Song.pdf", "en_text": "Sagu Palm’s Song\n\nwhere to go in this storm?\nto another dimension, reflected in the water \nif I jump, ripples in the sky\nwhere the winds meet\nyou might see the dragon’s trail in the gorge \nthe wild thicket watches the changing tide\non the hill, the children scan the stars \nas the wind blows\nthe green turban touches all of us\nassigning destinies\nas god withdraws into the light \nI can hear the frogs starting to sing", "jp_text": "Sagu  Palm’s Song\n\n何処へゆくのか　嵐の中で\n水鏡に映る　隣合う世界 \n私が跳ねれば　空に波紋が\n風は交わり　狭間に龍の道が\n見えるだろう \n満ち引きを見ている原生の茂り\n丘の上で星を見る子ども\n風が吹いている\n夜光貝　触れる指\n命の振り分け\n光に　消える神さま \nかえるのうたが\nきこえてくるよ\n＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n下記「かえるのうた」より引用しています\nかえるのうたが\nきこえてくるよ\n＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n録音許諾番号\nーーーーーーーーーーーーーーーー\nＲ-2000626JV\nーーーーーーーーーーーーーーーー\n出版許諾番号\nーーーーーーーーーーーーーーーー\nJASRAC 出 2008718-001\nーーーーーーーーーーーーーーーー", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 8}, {"title": "Red Silence", "album": "7th — Windswept Adan (アダンの風)", "en_file": "Red Silence.pdf", "jp_file": "10_血の風.pdf", "en_text": "“Red Silence” \n\nblood, blood,\nthrough sickness\nthrough thunder\nthrough darkness \nfind your way\nbeloved dream, beloved dream\ntake shelter in the glowing flowers", "jp_text": "血の風\n\nチヨ　チヨ\nフーヤメ　ヤラワン\nウトゥルシャ　ハミドゥル　ヤラワン\nヤミユ　ヤラワン\nナー　ミチ　ミチ　ンカイイキ\nハナシャ　イミー\nハナシャ　イミー\nヒチャユン　パナヌ\nアマム\n＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n下記、訳になります。CDブックレットには掲載なし\nchiyo chiyo\nfuyame yarawan\nuturusha hamiduru yarawan\nyamiyu yarawan\nna mi chi mi chi nkaiiki\nhanasha imi\nhanasha imi\nhichayun pananu amamu\n血よ、血よ、\n疫病あれど\n激雷あれど\n闇夜あれど\n己の道をゆけ\n愛しき夢、愛しき夢\n光る花の宿借りよ\n＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n参考文献　佐喜眞興英『シマの話』郷土研究社 1925年", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 10}, {"title": "Hagupit", "album": "7th — Windswept Adan (アダンの風)", "en_file": "Hagupit.pdf", "jp_file": "11_Hagupit.pdf", "en_text": "Hagupit\n\nthe ocean’s song\nduring the full moon\ncaught in a storm\nvoice  light  eye  wind\nI place my ear over your heart\nlet it ﬂow\nend of the road\nwindswept ﬂooded garden\ninterwoven songs\nthinking of you\nI drift through the night\nbrilliant bioluminescence\nchildren of the sea dance upon the waves\nsleeping bones in the sand\nthe dreaming Adan\nI place my ear over your heart\nlet it ﬂow\nend of the road", "jp_text": "Hagupit\n\nうみぬうた　むちづきぬゆに　あらしにまう\nこえ　ひかり　まなこ　かぜ\nんにみみあて　ながるる\nぬちぬはて\nあらいさり　みちゆくその\nまざりあふ　うた\nあなたをおもへば　よるにただよう\nまばゆい　むれ\nなみまに　おどる　うみの　こたち\nりくに　ねむる　むくろ　アダンぬゆめ\nんにみみあて　ながるる\nぬちぬはて", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 11}, {"title": "Dawn in the Adan", "album": "7th — Windswept Adan (アダンの風)", "en_file": " Dawn in the Adan.pdf", "jp_file": "12_Dawn in the Adan.pdf", "en_text": "Dawn in the Adan\n\nthe murmur of dawn\nno one is here \nas the falling stardust returns to the eastern sky\ntomorrow perhaps\nthere is nothing to see here \neven then in the end\nyou’ll cradle my head in your arms\nlisten to the ancient ocean’s song \nthe small boats of the afterlife are saying something to me\nbut I can’t hear it all\nmy heart flutters then \nhigh in the sky\neven with both arms stretched out \nthey break off\nthis place is always open you know \nbut no one comes\na long time I wait patiently\nthe children who cross the ocean\nawaken with the flowers \nits skin is torn\nwhat is this?\nseawater pouring from its body\na beautiful creature \ncrawling outside", "jp_text": "Dawn in the Adan \n\nよあけの　ざわめき\nここにはだれも　いないけれど\nおちてきた　ほしくずが\n東のそらに　かえっていくの\nあした　ここに\nみえる姿はないのかも\nそれでも　さいご\nあなたのうでの中に\nほほを　うずめ\nむかしのうみのおとを\n彼岸の　小舟から\nここへなにか　知らせているの\nすべては　聞こえない\nこころがたしかに　震えるけれど\n高く　そらに\n両手をのばしていても\n途切れてしまう\nいつでもここは開けているよ\nまだ　こない\nずっとまちつづけている\nうみをわたる\n子どもたち\n花とめざめる\n\n皮膚を\n裂いて\nこれは\nなあに\n身体から\nうみが　あふれて\nうつくしい　いきもの\n外へ　出ていく", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 12}, {"title": "Luminescent Creatures", "album": "7th — Windswept Adan (アダンの風)", "en_file": "Luminescent Creatures.pdf", "jp_file": "14_アダンの島の誕生祭.pdf", "en_text": "“Luminescent Creatures” \n\nis there anyone here\ndeep down on the bottom of the sea?\nin a place called the sky\na huge ball of light\nis floating\nsomewhere tonight\nif you heard my voice\nreply with a small tremor\ni’ll send you something you’ve yet to see, melody\nthat is if you’ve been born already \nthe coral, a cradle\nthe shell, a shelter\nthe sea, a pool of tears \nthe wind, a song", "jp_text": "アダンの島の誕生祭\n\nだれか、ここに、いますか、\nふかい、うみの、そこ\nそらと、よばれる、ところに\nおおきな、ひかりのたま\nうかんでいるよ、\nこんや、どこかで、\nこのこえが、きこえたなら、\nこたえて、ちいさな、ふるえ\nまだみぬ、すがたへ、おくるよ、メロディ\nきみが、うまれたなら、\n珊瑚はゆりかご、\n貝はシェルター、\nうみは泪溜め、\nかぜはうた、", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 14}, {"title": "COLORATURA", "album": "8th — Luminescent Creatures", "en_file": "COLORATURA_E:J.pdf", "jp_file": "1. COLORATURA_lyrics.docx", "en_text": "COLORATURA \n\nTo the lull of a gentle wave \nStormbreak, tailwind pushing us", "jp_text": "COLORATURA\n\n帆波の　揺蕩へ\n天つ日　民　追ひ風と", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 1}, {"title": "mazamun", "album": "8th — Luminescent Creatures", "en_file": "mazamun_E.pdf", "jp_file": "3. mazamun_lyrics.docx", "en_text": "mazamun \n\nFrom the edge of the galaxy  \nhear that gentle humming  \nThey slipped and fell  \nas they skipped along  \n\nMischievous mazamun, \nan imp from  \ndistant lands  \nhides out in the alocasia fields  \n\nWeaving drops of rain as \na gift for the bugs and roots.  \nA message from mycelium.  \nOpen your map, \nand let a raft of light float upon \nthe roars of the sea \n\nPlay with the world \nAn unexpected tunnel \nThe slumber of passiflora  \nand the voice of man \n\nI am lost \nin somebody elseʼs story \naccumulating \nmemories and  \ntower", "jp_text": "mazamun\n\n銀河のはしから　鼻歌きこえる\nスキップしてたら　すべりおちた\nお茶目なマザムン　とある島では\n魔物とよばれて　クワズイモに隠れてる\n雨粒を編んで\n虫たちと木の根におくりもの\n菌糸の伝言　地図を広げ\n海鳴りに光の舟を\n浮かべ\n世界と遊ぶ\nふいにトンネル\n時計草の催眠\n人間の声\nぼくは\nだれかの\nものがたりに紛れ\n積み重なる\n記憶と\nタワー", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 3}, {"title": "tower", "album": "8th — Luminescent Creatures", "en_file": "tower_E.pdf", "jp_file": "4. tower_lyrics.docx", "en_text": "tower \n\nSeated on the windowsill I stare at the night sky \nShould the sound of wings graze my ears, my chest of dreams shall be opened \nmemories, shaken off  \n\nLife quivers in time with city lights \nRed eyes. A herd of ohmu. Thereʼs nothing to fear. stay \n\nWhat was once known as magic  \nwhether it be distractions or deceptions  \nit matters not, if you remain  \n\nShould tonight be our last, \ndance with me once more  \na small light, a secret voice  \nPlease listen, \nI love you", "jp_text": "tower\n\n窓に腰掛け　夜空を見ていた\n羽根の音　かすめる頃　夢の蓋　開いて\n記憶　揺り落ちる\n街灯かりに　呼応する　いのちの震え\n赫い目玉　王蟲の群れ　怖くないよ　ここにいて\nかつて魔法と　呼ばれて　いたもの\nすべて　紛いものでも　嘘でもいいの\nあなたが　ここに　いるなら\n今夜最後だとしたら\nもう一度踊って\n小さな光　秘密の声\nお願い　きいて　愛してる", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 4}, {"title": "aurora", "album": "8th — Luminescent Creatures", "en_file": "aurora_E.pdf", "jp_file": "5. aurora_lyrics.docx", "en_text": "aurora \n\naurora \nFalling \nall across our star \n\nThe angels and demons \nof your soul \nAll bound together \nand embraced  \n\nNot smoke \nnor sorrow \nLook up at \nthat beautiful sky \nwhere borders melt, \nsee how they melt \n\naurora  \nFalling \nall across  \nour small star", "jp_text": "aurora\n\nオーロラ\n世界中に\nふれ　ふれ\nきみのこころの\n天使も悪魔も\nひと束に\n抱きよせる\nけむりじゃない\nかなしみじゃない\nみあげるのは\nきれいなそら\n線が溶ける\n溶けている\nオーロラ\n世界中に\n小さな星に\nふれ　ふれ", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 5}, {"title": "FLAG", "album": "8th — Luminescent Creatures", "en_file": "FLAG_E.pdf", "jp_file": "6. FLAG_lyrics.docx", "en_text": "FLAG \n\nIs it true,  \nthat we are reborn \nso many times over?  \n\nOcean breeze, burning eyes \nHeartbeat of a lighthouse \n\nThe footprints left on retinas \nBlink \nand they are interwoven \n\nYou are… \nAll across, from the left bank, into the dark \nThese forms are not ours \nRise, a fulgor of light \n\nRaise the sails \nsee them fill, listen to the wind, \nCoral-song to your ears \n\nA leaden sky, drapes upon your forehead \nthe tears of a ship \n\nNewly  \nwaxing and waning \nWe repeat fragments of song, spinning \n\nYou are… \n\nAll across, from the left bank, into the dark \nThese forms are not ours \nRise, a fulgor of light", "jp_text": "FLAG\n\n何度も\n生まれ変わるのは\nほんとう？\n潮風　睛を焼く\n灯台　鼓動\n網膜に張り付いた\n足あと　瞬き\nまざりあう\n君は\n闇行け　左岸から　みな　あわいへ\n姿かたち　借りもの\n光の群れ　立ち昇り\n帆をたて\n風を聞く　はためく\n鼓膜に珊瑚のうた\n鉛のそら　ひたいを舐め\n涙する　舟\n新しく\n満ち欠ける　明暗\nくりかえし　歌いかけ　回りつづける\n君は\n闇行け　左岸から　みな　あわいへ\n姿かたち　借りもの\n光の群れ　立ち昇り", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 6}, {"title": "Luciférine", "album": "8th — Luminescent Creatures", "en_file": " Luciférine_E.pdf", "jp_file": "8. Luciférine_lyrics.docx", "en_text": "Luciférine \n\nThe sound of awoken voices blooming, \nleaves but a single breath \n\nWe are free to forget the secrets  \nwe once kept  \n\nSinking in a cradle, \nIt has been warm  \nfrom long ago \n\n\nIʼve known \nalways, \na light deep within the soul  \nI hear it, just like this  \nThe brightness of the horizon \ninside each of us there is  \na place for our stars to sleep  \n\nI see it now, \nin my palm, now  \n\nIn this song \nnurtured  \nA child of the future  \nopens its eyes  \n\nAnd eats the world  \ngrowing big and strong \nTo swallow stars  \nand shout  \nItʼs alright, Here,  \nlife can be found  \nfrom long before  \nwords were ever born", "jp_text": "Luciférine\n\n目覚めた声が　咲き誇る音は\n息吹をのこして\nわたしたちもう　忘れていいの\n嘗ての秘めごと\n揺籠に沈みゆく\nあたたかい\nむかしから\nわかるの\nずっと\nこころの奥に　煌めくひかり\n聴こえている　こうして\n眩いかなた\n私たちの中にも\n星の寝床が流れている\nいま　見えている\nいま　手の中に\nうたのなか\n育ってる\n未来の子\n目を開けて\n世界を食べて\nおおきくなって\n星をのみこんで\n思い切りさけんで\nいいの　ここに\n命が　ちゃんと\nあることを\nもっと\n言葉の生まれる前から　ずっと", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 8}, {"title": "SONAR", "album": "8th — Luminescent Creatures", "en_file": "SONAR_E.pdf", "jp_file": "10. SONAR_lyrics.docx", "en_text": "SONAR  \n\nBeyond the darkness, a glimmer of  \nsomebodyʼs voyce \n\nI am here, although \nI know not where, and yet  \nI hear it  \n\nA light that fell long ago \npretends to be the soul \nbreathing in your body \n\nA seven colored droplet trembles awake \nThe world could end tomorrow yet, still,  \n\nBeyond the darkness, a glimmer \nOf first song", "jp_text": "SONAR\n\nやみのむこうに　点滅してる\nだれかのうたごえ\nわたしはここに　ここがどこなのか\nわからない　でも　ただ\nきこえてる\nずっとむかしに　おちてきたあかりが\nたましいのふりして\nきみのからだで　息をしてるの\nなないろのしづく　ふるえてる　ゆりおきる\nあした　世界がとじても　まだ\nやみのむこうに　点滅してる\nさいしょのうたごえ", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 10}, {"title": "Wakusei no Namida", "album": "8th — Luminescent Creatures", "en_file": "Wakusei no Namida_E.pdf", "jp_file": "11.惑星の泪_lyrics.docx", "en_text": "Wakusei no Namida \n\nBlue   Green \nScattered, changing paths \nRaise the sails \nA melody of a million light years \n\nHello \nGoodbye \n\nIn dreams \n\nI see you tenderly spread \nthe tears of stars \nand when they overflow, \ninterwoven in space-time \nthe ripples of stars \nHere \n\nBlue \nGreen \nA story is born \nMʼaider  \ntomorrow \nA melody of a million light years \n\nHello", "jp_text": "惑星の泪\n\nあお　みどり\nちりぢりに　軌道を変えて\n帆を立てて\n何億光年のメロディ\nはじめまして　さようなら\n夢にみる\nあなたが\nそっと蒔いた\n惑星のなみだ\nこぼれるたび\n交わる時空\n星の波紋\nここに\nあお　みどり\nうまれくる　ものがたり\nM’aider　みらい\n何億光年のメロディ\nはじめまして", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 11}, {"title": "Amuletum", "album": "Singles (シングル)", "en_file": "Amuletum.pdf", "jp_file": "守り哥-amuletum.pdf", "en_text": "Amuletum\n\nLet your song nest \nin the memory of stars\nO twinkling mirage, \nsail to horizons far beyond\nO flames \nencircling my voice, \nO god of the sun,\nwatch over us\nO life, cradle of words, \nin our pensive affection \nwe discover the perversion\nwe humans have come to\nSwaying\nbetwixt the oars,\nthe tail of a fingerling\nIn the fresh-born pulse,\nthere you are\nSeagulls bring \na rainbow’s tidings\nIn the silence and nostalgia,\nwide eyes pierce my heart \nO winds \nthat dwell in my voice,\nO sacred whale, \nshow me the way\nFigures appear among the waves \nand faraway lullabies are heard\nWhence these memories? \nThe ridges carved into your windpipe\ndraws a staff of five lines\nAnd in your singing exhale,\nthere you are", "jp_text": "「守り哥」 \n\n星の記憶に \nうたを棲ませてみれば \nまばたく 幻よ \n遥かなる \n航海へ \n\nわたしの聲を \nとりまく火よ \nお天道様 \n御守っておくれ \n\n言葉を抱く命 \n想ほゆ \n愛しさのなか \nひと \nたどりついた歪さを知る \n\n櫂の間に \n揺れる \n稚魚の尾 \nあらたにうまれた \n鼓動に \nあなたが \n\n\n虹の便りを \n告げにくるカモメ達 \nしじまに \n懐かしい \n胸を射る大きな眼 \n\nわたしの聲に 宿る風よ \nお鯨様 導いておくれ \n\n波間にあらわるひと \nとおくのこもりうたがきこえる \n\nあれはいつの面 ity is a kind of farewell \nand what tethers me here\nis this voice", "jp_text": "「永遠はさよなら」 \n\n幸せも苦しみも \n幻想に姿を変えることだけが \nとても上手で \n残るのは確かな今の息吹 \nあなたを想って \n吸い込んだ街の排気が \n私を満たして \n永遠はさよなら \nつなぎとめるものは \nこの歌声", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 999}, {"title": "Hello", "album": "Singles (シングル)", "en_file": "Hello.pdf", "jp_file": "もしもし.pdf", "en_text": "Hello\n\nIf you are at the beach,\nI will quietly leave a soft blanket for you\nRunning barefoot \nin fields and gardens\nLet us sing with the birds\na song for this new day\nThrough tears and laughter,\non rainy days, too\nLet me hear \nthe beating of your heart\nIf the wind blows, \nknit me a secret letter\nsend it to me\nIf there comes a day \nwhen you are lost, \nplease be still —\nbe still and listen \nIn the midst \nof this undulating world, \nraise your star", "jp_text": "もしもし \n\nもし　あなたが \n海辺にいるなら \nやわらかな毛布を \nそっと置いておくから \n裸足でかける \n原っぱや庭で \n鳥たちとあたらしい \nいちにちのうたを \nないてもわらっても \n雨の日も \nその胸の高鳴りを \nきかせて \n風が吹いたら \nひみつの手紙を \n編んで届けて \nもし　あなたに \n迷う日がきたら \nどうかそのまま \n耳を澄ませて \n波打つ世界の \nまんなかで \nあなたの星をかかげて", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 999}, {"title": "meringue doll", "album": "Singles (シングル)", "en_file": "meringue doll EN.pdf", "jp_file": "meringue doll.pdf", "en_text": "meringue doll\n\nIn the depths of my memory \nThere is a blossoming airship \nAs the seasons sprout \nI travel, swaying in the wind \nSurely one day, I’ll find my way home, \nSo, just wait for me\nFor your sadness, a song\nI savor the taste of you by my side \nWhen I hold you close\nDappled sunlight dances, laughing\nSurely one day, I’ll welcome you home\nThe wanting for you\nEnvelops me like a meringue \nAnd for my wanting, a flower", "jp_text": "meringue doll\n\n記憶のそこに　咲いている飛行船\n季節が芽吹き　風に揺れて旅する\nきっといつかは　かえりつくから　\n待っていて\nさみしさにはうたを　貴方がいる味わいを\n抱きしめたら　木漏れ日が\n微笑んで　踊る\nきっといつかは　かえっておいで\n会いたい気持ちは\nメレンゲのようにつつんで\n小さな花を添えましょう", "fr_text": "", "fr_file": "", "en_lang": "en", "track_num": 999}, {"title": "Seabed Eden", "album": "Singles (シングル)", "en_file": "Seabed Eden .pdf", "jp_file": "海底のエデン-Seabed Eden.pdf", "en_text": "Seabed Eden\n\nSomeday\nthough I may forget you, \nO eyes of ineffable beauty \nwhilst plunging headlong\nI know \nlike a seagull by the window\nunable to traverse the light \nfrom a lull in the night\nthere is \na voice \nFor all the dazzle of daybreak\nweeping \nfor love\nand singing,\nFor those who fade \ninto isles of solitude,\nEden lies at the bed of the sea\nfor those who have caressed\npollinating blossoms", "jp_text": "「海底のエデン」\n\nいつか\nあなたを忘れてしまっても\n言葉にはできない\nうつくしいひとみ\n堕ちるさなか\nきっと\n窓辺の鷗のように\nひかりをわたれない\nよるの合間にいて\nこえ\nあいを\nないて\nうたう\n夜明けの眩しさたちも\n孤島に消えゆく人も\n海底のエデン\n交配する\n花に触れたなら\n英語タイトル　Seabed Eden", "fr_text": "Seabed Eden - French\n\ntu sais\nmême si un jour\nj’oublie comme tes yeux étaient beaux\nsi je pars sans faire le moindre bruit\nsans savoir ce qui m’attend ni\nsi quelqu’un me trouvera\nje suis\ncomme un oiseau\nà ta fenêtre je fais mon nid\nla mer est calme et soudain, comme une île\nau beau milieu de la nuit\nc’est toi, c’est ta voix\njusqu’à l’aube\nj’attendrai\npour chanter mh\net que tu me voies traverser la lumière\ndéposer ma peine dans le lit des rivières\nou dans le jardin d’eden\nnotre amour est un pollen\nune ﬂeur de printemps.", "fr_file": "Seabed Eden - French.pdf", "en_lang": "en", "track_num": 999}, {"title": "Space Orphans", "album": "Singles (シングル)", "en_file": "Space Orphans EN.pdf", "jp_file": "Space Orphans.pdf", "en_text": "Space Orphans \n\nIsn’t it strange? \nHow we go to sleep each night \nin some quiet place, that’s neither land nor sea \nSince that day the dragon awoke \nthe space orphans have been searching for something \nLook ahead \nWith you beside me, I’ll be just fine \nNow, your voice, my song, \nour seven colored plume, \nspinning in the cosmos \nA colony of lapis \nWith you beside me, I’ll always be just fine", "jp_text": "「Space Orphans」\n\n毎晩 ねむってしまうのはふしぎ 陸でもない \n海でもない しずかなところ\n龍が めざめたあの日から なにかを さがしてる うち function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
 
function norm(s){
  if(!s)return'';
  try{s=s.normalize('NFKC');}catch(e){}
  s=s.toLowerCase();
  s=s.replace(/[\s\u3000]+/g,' ').trim();
  s=s.replace(/[^\w\s\u3000-\u9fff\u30a0-\u30ff\u3040-\u309f\u4e00-\u9fff]/g,' ');
  return s.replace(/\s+/g,' ').trim();
}
 
function extractJpTitle(t){
  if(!t)return'';
  const lines=t.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length)return'';
  // 1. Look for 「title」 or 『title』 brackets in first 3 lines → return inner text
  for(const l of lines.slice(0,3)){
    const m=l.match(/^[「『]([^」』]{1,35})[」』]/);
    if(m)return m[1];
  }
  // 2. First line that is short enough to be a title (EN or JP)
  const first=lines[0];
  if(first.length<=45)return first;
  // 3. First short CJK line
  for(const l of lines.slice(0,4)){
    if(/[\u3040-\u9fff]/.test(l)&&l.length<=45)return l;
  }
  return'';
}

const albumOrder=[], albumMap={};
SONGS.forEach((song,idx)=>{
  const jpT=extractJpTitle(song.jp_text);
  song._jpt=jpT;
  song._norm=norm(song.title)+' '+norm(song.album)+' '+norm(jpT);
  song._idx=idx;
  if(!albumMap[song.album]){albumMap[song.album]=[];albumOrder.push(song.album);}
  albumMap[song.album].push(song);
});

    const frBadge=(song.en_lang==='fr'||(song.fr_text&&song.fr_text.length>5))?`<span class="lang-badge">FR</span>`:'';
    item.innerHTML=`<span class="dot ${hasJp?'jp':'nojp'}"></span><span class="song-name">${esc(song.title)}</span>`+frBadge+(song._jpt?`<span class="jp-hint">${esc(song._jpt)}</span>`:'');
    item.addEventListener('click',()=>selectSong(song._idx));
    grp.appendChild(item);
  });
  sidebar.appendChild(grp);
  groupEls[album]=grp;
});
sidebar.appendChild(noResults);
updateCount();
 
function updateCount(){
  const n=sidebar.querySelectorAll('.song-item:not(.hidden)').length;
  countEl.textContent=n+' songs';
}
 
// Search
const searchEl=document.getElementById('search');
searchEl.addEventListener('input',()=>{
  const q=norm(searchEl.value);
  let any=false;
  sidebar.querySelectorAll('.song-item').forEach(el=>{
    const m=!q||el.dataset.norm.includes(q);
    el.classList.toggle('hidden',!m);
    if(m)any=true;
  });
  Object.values(groupEls).forEach(g=>{
    g.style.display=g.querySelector('.song-item:not(.hidden)')?'':'none';
  });
  noResults.style.display=any?'none':'block';
  updateCount();
});
searchEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'){const f=sidebar.querySelector('.song-item:not(.hidden)');if(f){f.click();searchEl.blur();}}
  if(e.key==='Escape'){searchEl.value='';searchEl.dispatchEvent(new Event('input'));}
  if(e.key==='ArrowDown'){e.preventDefault();navigateSong(1);}
  if(e.key==='ArrowUp'){e.preventDefault();navigateSong(-1);}
});
 
// Select song
const welcome=document.getElementById('welcome');
const lyricsView=document.getElementById('lyricsView');
const songTitle=document.getElementById('songTitle');
const jpTitle=document.getElementById('jpTitle');
const songMeta=document.getElementById('songMeta');
const enText=document.getElementById('enText');
const jpText=document.getElementById('jpText');
const enFilename=document.getElementById('enFilename');
const jpFilename=document.getElementById('jpFilename');
 
function selectSong(idx){
  currentIdx=idx;
  const song=SONGS[idx];
  sidebar.querySelectorAll('.song-item').forEach(el=>{
    el.classList.toggle('active',parseInt(el.dataset.idx)===idx);
  });
  const act=sidebar.querySelector('.song-item.active');
  if(act)act.scrollIntoView({block:'nearest'});
  // Keep setlist highlight in sync when navigating via keys / prev-next
  if(setlistMode){
    document.querySelectorAll('.setlist-item[data-sidx]').forEach(el=>{
      el.classList.toggle('s-active',parseInt(el.dataset.sidx)===idx);
    });
    const sa=document.querySelector('.setlist-item.s-active');
    if(sa)sa.scrollIntoView({block:'nearest'});
  }
  songTitle.textContent=song.title;
  jpTitle.textContent=song._jpt||'';
  songMeta.textContent=song.album;
  enFilename.textContent=song.en_file||'';
  jpFilename.textContent=song.jp_file||'';
  // Left column label: English or Français
  document.querySelector('#colEn .col-label').firstChild.textContent=
    song.en_lang==='fr'?'Français · フランス語 ':'English ';
  // FR section
  const frSection=document.getElementById('frSection');
  const frText=document.getElementById('frText');
  const frFilename=document.getElementById('frFilename');
  if(song.fr_text&&song.fr_text.length>5&&!song.fr_text.startsWith('[')){
    frText.textContent=song.fr_text;
    frFilename.textContent=song.fr_file||'';
    frSection.classList.add('visible');
  }else{
    frText.textContent='';
    frSection.classList.remove('visible');
  }
  if(song.en_text&&song.en_text.length>5&&!song.en_text.startsWith('[')){
    enText.textContent=song.en_text;
  }else{
    enText.innerHTML='<span class="empty-note">No English lyrics available.</span>';
  }
  if(song.jp_text&&song.jp_text.length>5&&!song.jp_text.startsWith('[')){
    jpText.textContent=song.jp_text;
  }else{
    jpText.innerHTML='<span class="empty-note">日本語の歌詞はありません。</span>';
  }
  welcome.style.display='none';
  lyricsView.style.display='flex';
  document.getElementById('colEn').scrollTop=0;
  document.getElementById('colJp').scrollTop=0;
}
 
function navigateSong(dir){
  if(setlistMode){
    if(!setlistOrder.length)return;
    if(currentIdx===null){selectSong(setlistOrder[0]);return;}
    const pos=setlistOrder.indexOf(currentIdx);
    const nxtPos=pos+dir;
    if(nxtPos>=0&&nxtPos<setlistOrder.length)selectSong(setlistOrder[nxtPos]);
    return;
  }
  const vis=[...sidebar.querySelectorAll('.song-item:not(.hidden)')];
  if(!vis.length)return;
  if(currentIdx===null){selectSong(parseInt(vis[0].dataset.idx));return;}
  const cur=sidebar.querySelector(`.song-item[data-idx="${currentIdx}"]`);
  const pos=vis.indexOf(cur);
  const nxt=vis[pos+dir];
  if(nxt)selectSong(parseInt(nxt.dataset.idx));
}
 
// Keyboard
document.addEventListener('keydown',e=>{
  if(document.activeElement===searchEl)return;
  if(e.key==='ArrowDown'||e.key==='j')navigateSong(1);
  if(e.key==='ArrowUp'||e.key==='k')navigateSong(-1);
  if(e.key==='/'||e.key==='f'){e.preventDefault();searchEl.focus();}
});
 
// Scroll sync
let syncOn=false,syncing=false;
const syncBtn=document.getElementById('syncBtn');
const colEn=document.getElementById('colEn');
const colJp=document.getElementById('colJp');
syncBtn.addEventListener('click',()=>{
  syncOn=!syncOn;
  syncBtn.classList.toggle('on',syncOn);
  syncBtn.textContent=syncOn?'⇅ Synced':'⇅ Sync';
});
function doSync(src,tgt){
  if(!syncOn||syncing)return;
  syncing=true;
  tgt.scrollTop=(src.scrollTop/Math.max(1,src.scrollHeight-src.clientHeight))*(tgt.scrollHeight-tgt.clientHeight);
  syncing=false;
}
colEn.addEventListener('scroll',()=>doSync(colEn,colJp));
colJp.addEventListener('scroll',()=>doSync(colJp,colEn));
 
// Prev/Next
document.getElementById('prevBtn').addEventListener('click',()=>navigateSong(-1));
document.getElementById('nextBtn').addEventListener('click',()=>navigateSong(1));
 
// ── PDF / Print download ──────────────────────────────────────────────────────

  if(currentIdx===null)return;
  const song=SONGS[currentIdx];
  const mode=document.querySelector('.vtbtn.active').dataset.mode;

  const html=`<!DOCTYPE html>

// Font size
let fontSize=1.05;
function setSize(s){
  fontSize=Math.max(0.75,Math.min(2.2,s));
  document.querySelectorAll('.lyrics-text').forEach(el=>el.style.fontSize=fontSize+'rem');
}
document.getElementById('fSmall').addEventListener('click',()=>setSize(fontSize-0.1));
document.getElementById('fLarge').addEventListener('click',()=>setSize(fontSize+0.1));
 
// ── View Mode (Both / EN only / JP only) ─────────────────────────────────────
const colsEl=document.querySelector('.cols');
document.getElementById('viewToggle').addEventListener('click',e=>{
  const btn=e.target.closest('.vtbtn');
  if(!btn)return;
  document.querySelectorAll('.vtbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const mode=btn.dataset.mode;
  colsEl.classList.remove('solo-en','solo-jp','solo-fr');
  if(mode==='en')colsEl.classList.add('solo-en');
  if(mode==='jp')colsEl.classList.add('solo-jp');
  if(mode==='fr')colsEl.classList.add('solo-fr');
});
 
// ── Setlist OCR ───────────────────────────────────────────────────────────────
let setlistMode=false;
let setlistOrder=[];   // song indices in setlist order (matched songs only)
 
const dropZone=document.getElementById('dropZone');
const setlistFile=document.getElementById('setlistFile');
const ocrStatus=document.getElementById('ocrStatus');
const setlistDisplay=document.getElementById('setlistDisplay');
const setlistUploadArea=document.getElementById('setlistUploadArea');
const setlistItems=document.getElementById('setlistItems');
const setlistClear=document.getElementById('setlistClear');
 
// Drag-over visual feedback
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{
  e.preventDefault();dropZone.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/'))runOCR(f);
});
setlistFile.addEventListener('change',()=>{
  if(setlistFile.files[0])runOCR(setlistFile.files[0]);
});
 
function showOcrStatus(msg){
  ocrStatus.textContent=msg;
  ocrStatus.classList.toggle('show',!!msg);
}
 
async function runOCR(file){
  showOcrStatus('⏳ Reading image…');
  try{
    const {data:{text}}=await Tesseract.recognize(file,'eng',{
      logger:m=>{
        if(m.status==='recognizing text'){
          const pct=Math.round(m.progress*100);
          showOcrStatus(`⏳ OCR ${pct}%…`);
        }
      }
    });
    showOcrStatus('✅ Done! Matching songs…');
    buildSetlist(text);
    setTimeout(()=>showOcrStatus(''),1500);
  }catch(err){
    showOcrStatus('❌ OCR failed: '+err.message);
  }
}
 
// Fuzzy song match: returns best SONGS entry or null
function matchLine(line){
  const ln=norm(line);
  if(ln.length<3)return null;
  let best=null,bestScore=0;
 
  function score(a,b){
    if(!a||!b)return 0;
    if(a===b)return 1;
    if(a.includes(b)||b.includes(a))
      return Math.min(a.length,b.length)/Math.max(a.length,b.length);
    // word overlap
    const wa=new Set(a.split(' ').filter(w=>w.length>1));
    const wb=b.split(' ').filter(w=>w.length>1);
    if(!wa.size||!wb.length)return 0;
    const hits=wb.filter(w=>wa.has(w)).length;
    return hits/Math.max(wa.size,wb.length);
  }
 
  SONGS.forEach(song=>{
    const tn=norm(song.title);
    const jn=norm(song._jpt||'');
    const s=Math.max(score(ln,tn),score(ln,jn));
    if(s>bestScore){bestScore=s;best=song;}
  });
  return bestScore>=0.35?best:null;
}
 
function buildSetlist(ocrText){
  // Split into lines, skip very short / header-like lines
  const lines=ocrText.split('\n')
    .map(l=>l.trim())
    .filter(l=>l.length>=3);
 
  const entries=[];
  let num=0;
  lines.forEach(line=>{
    const song=matchLine(line);
    // Only include lines that look like song titles
    // (exclude lines that are clearly OCR noise: only digits, single word < 3 chars)
    if(song||line.length>=4){
      num++;
      entries.push({raw:line,song,num});
    }
  });
 
  if(!entries.length){showOcrStatus('⚠️ No readable lines found.');return;}
 
  // Build setlistOrder: song indices in the order they appear on the setlist
  setlistOrder=entries.filter(e=>e.song).map(e=>e.song._idx);
 
  setlistItems.innerHTML='';
  entries.forEach(entry=>{
    const div=document.createElement('div');
    div.className='setlist-item'+(entry.song?'':' unmatched');
    if(entry.song) div.dataset.sidx=entry.song._idx;  // used by selectSong for highlight sync
    const jp=entry.song?entry.song._jpt:'';
    div.innerHTML=
      `<span class="setlist-num">${entry.num}</span>`+
      `<span class="setlist-title">${esc(entry.song?entry.song.title:entry.raw)}</span>`+
      (jp?`<span class="setlist-jp">${esc(jp)}</span>`:'');
    if(entry.song){
      div.addEventListener('click',()=>{
        document.querySelectorAll('.setlist-item').forEach(i=>i.classList.remove('s-active'));
        div.classList.add('s-active');
        selectSong(entry.song._idx);
      });
    }
    setlistItems.appendChild(div);
  });
 
  // Hide the catalogue — setlist is the only navigation now
  setlistMode=true;
  document.querySelectorAll('.album-group').forEach(g=>g.style.display='none');
  noResults.style.display='none';
  searchEl.style.display='none';
  countEl.style.display='none';
 
  setlistUploadArea.style.display='none';
  setlistDisplay.style.display='';
}
 
setlistClear.addEventListener('click',()=>{
  // Restore catalogue
  setlistMode=false;
  setlistOrder=[];
  document.querySelectorAll('.album-group').forEach(g=>g.style.display='');
  searchEl.style.display='';
  countEl.style.display='';
  setlistDisplay.style.display='none';
  setlistUploadArea.style.display='';
  setlistFile.value='';
  showOcrStatus('');
  // Re-apply any active search filter
  searchEl.dispatchEvent(new Event('input'));
});
</script>
